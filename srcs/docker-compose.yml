services:
  mariadb:
    container_name: mariadb
    image: mariadb
    build: 
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    networks:
      - inception
    volumes:
      - mariadb:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password

  wordpress:
    container_name: wordpress
    image: wordpress
    build: 
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    depends_on:
      - mariadb
    networks:
      - inception
    volumes:
      - wordpress:/var/www/html
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password

  nginx:
    container_name: nginx
    image: nginx
    build: 
      context: ./requirements/nginx
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: always
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - inception
    #Nginx shares the same volume as Wordpress to serve the files
    volumes:
      - wordpress:/var/www/html
      

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt

networks:
  inception:
    driver: bridge
    name: inception

volumes:
  mariadb:
    driver: local
    name: mariadb
    driver_opts:
      type: none
      o: bind
      device: ${HOME_DIR}/data/mariadb

  wordpress:
    driver: local
    name: wordpress
    driver_opts:
      type: none
      o: bind
      device: ${HOME_DIR}/data/wordpress